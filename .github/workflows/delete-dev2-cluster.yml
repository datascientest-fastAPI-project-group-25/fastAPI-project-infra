name: Delete Dev2 EKS Cluster

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  delete_cluster:
    name: Delete Dev2 EKS Cluster
    runs-on: ubuntu-latest
    env:
      AWS_ACCOUNT_ID: "575977136211"
      AWS_DEFAULT_REGION: "us-east-1"
      PROJECT_NAME: "fastapi-project"
      ENVIRONMENT: "dev2"
      CLUSTER_NAME: "fastapi-project-eks-dev2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::575977136211:role/github-actions-dev
          aws-region: us-east-1

      - name: Validate AWS credentials
        run: |
          aws sts get-caller-identity || {
            echo "Failed to validate AWS credentials"
            exit 1
          }

      - name: Apply IAM changes first
        run: |
          cd terraform/environments/clean-deploy/development
          terraform init \
            -backend-config="bucket=fastapi-project-terraform-state-${AWS_ACCOUNT_ID}" \
            -backend-config="key=fastapi/infra/dev/terraform.tfstate" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="dynamodb_table=terraform-state-lock-dev"
          
          echo "Applying IAM changes to add EKS permissions..."
          terraform apply -target=module.iam -auto-approve

      - name: Delete EKS cluster
        run: |
          echo "Deleting EKS cluster: $CLUSTER_NAME"
          aws eks delete-cluster --name $CLUSTER_NAME --region $AWS_DEFAULT_REGION

      - name: Wait for cluster deletion
        run: |
          echo "Waiting for cluster deletion to complete..."
          while true; do
            if ! aws eks describe-cluster --name $CLUSTER_NAME --region $AWS_DEFAULT_REGION 2>/dev/null; then
              echo "Cluster deletion completed successfully!"
              break
            fi
            echo "Cluster is still being deleted, waiting..."
            sleep 30
          done
